services:
  imessage-exporter-viewer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: imessage-exporter-viewer
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - /path/to/your/imessage/exports:/archives:ro
      - imessage_db:/data
    environment:
      - ARCHIVE_ROOT=/archives
      - DB_PATH=/data/imessage.db
      - WATCH_INTERVAL_SECONDS=60
    restart: unless-stopped

volumes:
  imessage_db:
